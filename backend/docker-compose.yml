services:
  backend:
    build:
      context: .
    environment:
      APP_NAME: ${APP_NAME:-SentinelXDR API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-sentinelxdr}
      MONGODB_PING_TIMEOUT_MS: ${MONGODB_PING_TIMEOUT_MS:-1000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PING_TIMEOUT_SECONDS: ${REDIS_PING_TIMEOUT_SECONDS:-1.0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-minimum-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      AGENT_API_KEY_BYTES: ${AGENT_API_KEY_BYTES:-32}
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
