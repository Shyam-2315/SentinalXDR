upstream sentinelxdr_frontend {
    server frontend:80;
}

upstream sentinelxdr_backend {
    server backend:8010;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api {
        proxy_pass http://sentinelxdr_backend;
    }

    location /api/ {
        proxy_pass http://sentinelxdr_backend;
    }

    location = /api/v1 {
        proxy_pass http://sentinelxdr_backend;
    }

    location /api/v1/ {
        proxy_pass http://sentinelxdr_backend;
    }

    location = /health {
        proxy_pass http://sentinelxdr_backend;
    }

    location /health/ {
        proxy_pass http://sentinelxdr_backend;
    }

    # Local/staging only. In production, keep EXPOSE_API_DOCS=false so the
    # backend returns 404 for /docs, /redoc, and /openapi.json.
    location = /docs {
        proxy_pass http://sentinelxdr_backend;
    }

    location /docs/ {
        proxy_pass http://sentinelxdr_backend;
    }

    location = /redoc {
        proxy_pass http://sentinelxdr_backend;
    }

    location = /openapi.json {
        proxy_pass http://sentinelxdr_backend;
    }

    location / {
        proxy_pass http://sentinelxdr_frontend;
    }
}
